services:
  laravel_app:
    build:
      context: .
      dockerfile: .docker/php85/Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./laravel-app:/var/www
      - ./.docker/php85/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
    ports:
      - "9000:9000"
      - "${XDEBUG_CLIENT_PORT:-9003}:9003"
    environment:
      TZ: ${TZ:-UTC}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      XDEBUG_MODE: "${XDEBUG_MODE:-debug,develop}"
      XDEBUG_START_WITH_REQUEST: "${XDEBUG_START_WITH_REQUEST:-yes}"
      XDEBUG_DISCOVER_CLIENT_HOST: "${XDEBUG_DISCOVER_CLIENT_HOST:-1}"
      XDEBUG_CLIENT_HOST: "${XDEBUG_CLIENT_HOST:-}"
      XDEBUG_CLIENT_PORT: "${XDEBUG_CLIENT_PORT:-9003}"
      XDEBUG_IDEKEY: "${XDEBUG_IDEKEY:-PHPSTORM}"
      XDEBUG_LOG: "${XDEBUG_LOG:-/tmp/xdebug.log}"
      XDEBUG_LOG_LEVEL: "${XDEBUG_LOG_LEVEL:-0}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - playground-net

  chalice_app:
    build:
      context: ./.docker/python313
    container_name: chalice_app
    working_dir: /app
    volumes:
      - ./chalice-app:/app
    environment:
      TZ: ${TZ:-UTC}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    ports:
      - "8000:8000"
    depends_on:
      localstack:
        condition: service_started
    networks:
      - playground-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
      - "8001-8010:8001-8010"
    volumes:
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - playground-net
    depends_on:
      laravel_app:
        condition: service_started

  localstack:
    image: localstack/localstack
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      TZ: ${TZ:-UTC}
      SERVICES: ${LOCALSTACK_SERVICES:-logs,lambda,sqs}
      DEBUG: ${LOCALSTACK_DEBUG:-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - localstack-data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - playground-net

  aws_cli:
    image: amazon/aws-cli:2.15.0
    container_name: aws_cli
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    entrypoint: ["/bin/sh"]
    tty: true
    networks:
      - playground-net
    depends_on:
      localstack:
        condition: service_started

  redis:
    image: "redis:alpine"
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - "redis-data:/data"
    networks:
      - playground-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    build: ./.docker/mysql
    container_name: mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-}"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "${DB_DATABASE:-laravel}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
      MYSQL_EXTRA_OPTIONS: "${MYSQL_EXTRA_OPTIONS:-}"
    volumes:
      - "mysql-data:/var/lib/mysql"
    networks:
      - playground-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_ROOT_PASSWORD:-}"]
      retries: 3
      timeout: 5s
      interval: 5s

volumes:
  localstack-data:
  redis-data:
  mysql-data:

networks:
  playground-net:
    driver: bridge
