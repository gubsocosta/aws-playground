services:
  laravel_app:
    build:
      context: .
      dockerfile: .docker/php85/Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./laravel-app:/var/www
      - ./.docker/php85/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini:ro
    ports:
      - "${LARAVEL_APP_PORT:-8000}:8000"
      - "${XDEBUG_CLIENT_PORT:-9003}:9003"
    environment:
      TZ: ${TZ:-UTC}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
      XDEBUG_MODE: "${XDEBUG_MODE:-debug,develop}"
      XDEBUG_START_WITH_REQUEST: "${XDEBUG_START_WITH_REQUEST:-yes}"
      XDEBUG_DISCOVER_CLIENT_HOST: "${XDEBUG_DISCOVER_CLIENT_HOST:-1}"
      XDEBUG_CLIENT_HOST: "${XDEBUG_CLIENT_HOST:-}"
      XDEBUG_CLIENT_PORT: "${XDEBUG_CLIENT_PORT:-9003}"
      XDEBUG_IDEKEY: "${XDEBUG_IDEKEY:-PHPSTORM}"
      XDEBUG_LOG: "${XDEBUG_LOG:-/tmp/xdebug.log}"
      XDEBUG_LOG_LEVEL: "${XDEBUG_LOG_LEVEL:-0}"
    depends_on:
      localstack:
        condition: service_started
    networks:
      - playground-net

  chalice_app:
    build:
      context: ./.docker/python313
    container_name: chalice_app
    working_dir: /app
    volumes:
      - ./chalice-app:/app
    environment:
      TZ: ${TZ:-UTC}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    ports:
      - "${CHALICE_APP_PORT:-8001}:8001"
    depends_on:
      localstack:
        condition: service_started
    networks:
      - playground-net

  localstack:
    image: localstack/localstack
    container_name: localstack
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
      - "${LOCALSTACK_PORT_RANGE_START:-4510}-${LOCALSTACK_PORT_RANGE_END:-4559}:${LOCALSTACK_PORT_RANGE_START:-4510}-${LOCALSTACK_PORT_RANGE_END:-4559}"
    environment:
      TZ: ${TZ:-UTC}
      SERVICES: ${LOCALSTACK_SERVICES:-logs,lambda,sqs}
      DEBUG: ${LOCALSTACK_DEBUG:-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - localstack-data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - playground-net

  aws_cli:
    image: amazon/aws-cli:2.15.0
    container_name: aws_cli
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL:-http://localstack:4566}
    entrypoint: ["/bin/sh"]
    tty: true
    networks:
      - playground-net
    depends_on:
      localstack:
        condition: service_started

volumes:
  localstack-data:

networks:
  playground-net:
    driver: bridge
